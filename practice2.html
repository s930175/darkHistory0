    <style>
        *{
            margin: 0;
            padding: 0;
            list-style: none;
            box-sizing: border-box;
        }
        body{

        }
        a{
            text-decoration: none;
            color: rgb(73, 72, 72);

        a:hover{

        }
        /* 上方列 */
        .wrap{

        }
        .main1{
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }
        .main1 img{

            height: auto;
            border-radius: 30px;
            transition: .8s;
        }
        .main1 img:hover{
            width: 300px;
            height: auto;
        }
        .main1 h2{
            font-size: 40px;
            text-align: center;
            padding: 30px 0;
        }
        .main1 p{
            text-align: left;
            padding: 80px 0;
        }
        .main2{
            display: flex;
            justify-content: center;
        }
        .school{
            margin: 2px;
        }
        .experience{
            margin: 2px;
        }
        .license{
            margin: 2px;
        }
        .main2 img{
            width: 300px;
            height: 250px;
            border: 1px solid gray;
            border-radius: 33%;
            overflow: hidden;
            padding: 3px 3px;
            margin: 0;
            transition: .5s;
        }
        .main2 img:hover{
            border-radius: 50%;
            padding: 1px;
        }
        .main2 h3{
            font-size: 30px;
            text-align: center;
            padding: 5px;
        }
        .main2 p{
            font-size: 16px;
            text-align: center;
            padding: 5px;
        }
        .message{
            padding-top: 15px;
            font-size: 30px;
            display: flex;
            justify-content: center;
            text-align: center;
        }
        .txt-1 input{
            display: flex;
            margin: auto;
        }
        .txt{
            width: 30%;
            height: 200px;
            display: flex;
            margin: 0 0 0 35%;
        }
        .button{
            margin: 0 0 0 49%;
        }

        /* 下方列 */
        .main-footer{
            font-family: Arial, Helvetica, sans-serif;

            background-color: rgba(152, 151, 151, 0.6);
