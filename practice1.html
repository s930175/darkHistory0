<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>001</title>
    <link rel="stylesheet" href="reset.css">
    <style>
        .wrap{
            position: relative;
        }
        .wrap img{
            width: 100%;
            margin: 0;
        }
        .wrap button{
            position: absolute;
            right: 41%;
            top: 41%;
            left: 47%;
            bottom: 45%;
            border-radius: 40%;
            border: none;
            background-color: rgba(245, 189, 143, 0);
        }
        a{
            text-decoration: none;
            font-size: 3em;
            color:gray;
            transition: 1.0s;
        }
        a:hover{
            font-size: 4em;
            color: black;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <img src="img/1.jpg" alt="">
        <button><a href="practice2.html">here</a></button>
    </div>
</body>
</html>
